services:
  - type: web
    name: betpredict-terminal
    env: node
    plan: free 
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true
      - key: RAPIDAPI_KEY
        sync: false
      - key: THE_ODDS_API_KEY
        sync: false
